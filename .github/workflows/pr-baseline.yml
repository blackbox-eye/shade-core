name: pr-baseline

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-baseline-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify baseline files
        run: |
          test -f README.md
          test -f docs/README.md
          test -f docs/adr/0001-repository-bootstrap.md
          test -f docs/architecture/01-system-context-and-boundaries.md
          test -f docs/governance/branch-pr-rules.md
          test -f .github/CODEOWNERS
          test -f .github/workflows/pr-baseline.yml
          echo "PR baseline OK"

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest
